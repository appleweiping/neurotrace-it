project: neurotrace-it
status: design_only
run_tier: paper_candidate
claim: trajectory-level activation data selection improves IT with lower drift
datasets:
  - math_instruction_pool
  - code_instruction_pool
  - multi_hop_qa_instruction_pool
  - general_retention_eval
  - factuality_drift_eval
baselines:
  - random_subset
  - full_data_it
  - quality_score_selection
  - diversity_coreset
  - influence_gradient_selection
  - endpoint_neuron_selection
  - layer_selective_no_trajectory
seeds:
  paper_minimum: 20
metrics:
  target:
    - exact_match
    - pass_rate
  retention:
    - aggregate_retention_score
    - semantic_drift
  hallucination:
    - factuality_error_rate
    - harmful_overconfidence_rate
  efficiency:
    - selection_cost_hours
    - training_cost_hours
# GATES SYNCED TO THE v5 LOCKED THRESHOLDS (C+D hardening, 2026-06-19).
# The binding source of the locked decision thresholds is
# configs/experiments/lattice_v5.yaml + docs/redesign/REDESIGN_v5.md (§5.6); where
# this file and lattice_v5.yaml ever disagree, lattice_v5.yaml governs. The legacy
# v4-era gate values (0.03 target / 0.02 trajectory / 0.01 drift / 2.0 cost) are
# SUPERSEDED. Margins are on the normalized [0,1] utility scale; the cost gate is a
# relative training-compute overhead ceiling. These are pre-registered DESIGN
# CHOICES, not results. server.authorized stays false.
gates:
  # delta_target (R2-target superiority margin; was 0.03)
  target_or_adjusted_relative_gain: 0.01
  # delta_R1 (routing win margin; was the 0.02 trajectory-vs-endpoint gate)
  trajectory_endpoint_relative_gain: 0.01
  # delta_ret (retention-drift non-inferiority ceiling; was 0.01)
  max_retention_drift_abs: 0.02
  # delta_hall (hallucination-drift non-inferiority ceiling; was 0.01)
  max_hallucination_drift_abs: 0.02
  # delta_cost (relative training-compute overhead ceiling, 5%; replaces the 2.0x
  # selection-cost multiplier of the v4 design)
  max_cost_overhead_rel: 0.05
  # legacy v4 selection-cost multiplier, retained as SUPERSEDED for provenance only
  max_selection_cost_multiplier_superseded: 2.0
  # floor_partial (Gate-R0 partial-R^2 floor)
  floor_partial: 0.01
  endpoint_baseline_required: true
binding_source: configs/experiments/lattice_v5.yaml
server:
  authorized: false
  reason: ARIS design review not complete; thresholds locked per lattice_v5.yaml

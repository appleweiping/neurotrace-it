project: neurotrace-it
run_tier: first_gate
buffer_percent: 30
resources:
  activation_extraction_gpu_hours: 12
  endpoint_selection_gpu_or_cpu_hours: 2
  trajectory_selection_gpu_or_cpu_hours: 4
  matched_lora_training_gpu_hours: 24
  storage_gb: 500
  wall_clock_hours: 72
preflight_required:
  - gpu_available
  - output_dir_empty_or_resumable
  - disk_free_gb_at_least_650
  - raw_activation_cleanup_policy_confirmed
# Stop conditions synced to the v5 locked thresholds (C+D hardening, 2026-06-19);
# binding source configs/experiments/lattice_v5.yaml (delta_target=0.01,
# delta_ret=0.02, delta_cost=0.05). Legacy v4 values (0.03/0.01/2.0x) superseded.
stop_conditions:
  - target_gain_below_0_01
  - retention_drift_above_0_02
  - cost_overhead_rel_above_0_05

